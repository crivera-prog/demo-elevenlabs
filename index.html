<!DOCTYPE html>
<html>
<head>
<title>Demo ElevenLabs</title>
</head>

<body>

<h2>Demo voz con ElevenLabs</h2>

<input id="texto" type="text" placeholder="Escribe algo">
<button onclick="hablar()">Generar voz</button>

<audio id="audio" controls></audio>

<script>

async function hablar(){

const texto = document.getElementById("texto").value;

const response = await fetch("https://api.elevenlabs.io/v1/text-to-speech/y2ijeTfmnXjzheHO6zeN", {

method: "POST",

headers: {
"Content-Type": "application/json",
"xi-api-key": "sk_e478a7fa47cbf65aed6dd96dfe14a85ea19c788aa9110385"
},

body: JSON.stringify({
text: texto
})

});

const audioBlob = await response.blob();

const audioURL = URL.createObjectURL(audioBlob);

document.getElementById("audio").src = audioURL;

}

</script>

</body>
</html>
